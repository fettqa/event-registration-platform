name: E2E Java (Playwright)

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'tests-e2e/java/**'
      - '.github/workflows/e2e-java.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'tests-e2e/java/**'
      - '.github/workflows/e2e-java.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make gradlew executable
        working-directory: app
        run: chmod +x gradlew

      - name: Build app
        working-directory: app
        run: ./gradlew bootJar -x test

      - name: Start Spring Boot
        working-directory: app
        run: |
          JAR=$(ls build/libs/*SNAPSHOT.jar | head -n 1)
          nohup java -jar "$JAR" > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app
        working-directory: app
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep -q UP; then
              exit 0
            fi
            sleep 2
          done
          cat app.log || true
          exit 1

      - name: Make e2e gradlew executable
        working-directory: tests-e2e/java
        run: chmod +x gradlew

      - name: Install Playwright Chromium
        working-directory: tests-e2e/java
        run: ./gradlew installPlaywright

      - name: Run E2E tests
        working-directory: tests-e2e/java
        run: ./gradlew test -DbaseUrl=http://localhost:8080

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-java-report
          path: |
            tests-e2e/java/build/reports/tests/test
            app/app.log