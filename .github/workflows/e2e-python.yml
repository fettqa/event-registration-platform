name: E2E Python (Playwright)

on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'tests-e2e/python/**'
      - '.github/workflows/e2e-python.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'tests-e2e/python/**'
      - '.github/workflows/e2e-python.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tests-e2e/python/requirements.txt

      - name: Make gradlew executable
        working-directory: app
        run: chmod +x gradlew

      - name: Build app
        working-directory: app
        run: ./gradlew bootJar -x test

      - name: Start Spring Boot
        working-directory: app
        run: |
          JAR=$(ls build/libs/*SNAPSHOT.jar | head -n 1)
          echo "Starting $JAR"
          nohup java -jar "$JAR" > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for app
        working-directory: app
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8080/actuator/health | grep -q UP; then
              echo "App is UP"
              exit 0
            fi
            echo "Waiting... ($i)"
            sleep 2
          done
          echo "App failed to start"
          cat app.log || true
          exit 1

      - name: Install Python dependencies
        working-directory: tests-e2e/python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        working-directory: tests-e2e/python
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: tests-e2e/python
        env:
          BASE_URL: http://localhost:8080
        run: pytest

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-python-report
          path: |
            tests-e2e/python/test-results
            tests-e2e/python/playwright-report
            app/app.log
