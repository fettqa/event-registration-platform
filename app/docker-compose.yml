services:
  postgres:
    image: postgres:16-alpine
    container_name: event-registration-db
    environment:
      POSTGRES_DB: event_registration
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_user -d event_registration"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: