<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="app-header">
  <div class="app-header-inner">
    <a class="app-brand" href="/" data-testid="app-header">Event Registration Platform</a>
  </div>
</header>

<div class="page">
  <div class="topbar">
    <h1>Events</h1>
    <a class="btn" href="/events/new" data-testid="create-event-link">Create event</a>
  </div>

  <div class="card">
    <form class="filter-bar" method="get" action="/" data-testid="events-filter">
      <input type="search"
             name="q"
             th:value="${q}"
             placeholder="Search by event name"
             data-testid="events-search-input"/>
      <button type="submit" class="btn" data-testid="events-search-submit">Search</button>
      <a class="btn btn-secondary" href="/" th:if="${q != null and !q.isEmpty()}">Clear</a>
    </form>

    <div class="table-wrap">
      <table data-testid="events-table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Max seats</th>
          <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${events.totalElements == 0}">
          <td colspan="4" class="empty">No events found.</td>
        </tr>
        <tr th:each="e : ${events.content}" th:attr="data-testid=|event-row-${e.id()}|">
          <td th:text="${e.id()}"></td>
          <td th:text="${e.name()}"></td>
          <td th:text="${e.maxSeats()}"></td>
          <td>
            <a th:href="@{/events/{id}(id=${e.id()})}"
               th:attr="data-testid=|open-event-${e.id()}|">Open</a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" th:if="${events.totalPages > 1}" data-testid="events-pagination">
      <a class="btn btn-secondary"
         th:if="${events.hasPrevious()}"
         th:href="@{/(page=${events.number - 1}, q=${q})}">Previous</a>
      <span class="pagination-info"
            th:text="|Page ${events.number + 1} of ${events.totalPages} (${events.totalElements} total)|"></span>
      <a class="btn btn-secondary"
         th:if="${events.hasNext()}"
         th:href="@{/(page=${events.number + 1}, q=${q})}">Next</a>
    </div>
  </div>
</div>
</body>
</html>
