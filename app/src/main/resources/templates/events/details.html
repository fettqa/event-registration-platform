<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Event details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="app-header">
  <div class="app-header-inner">
    <a class="app-brand" href="/" data-testid="app-header">Event Registration Platform</a>
  </div>
</header>

<div class="page">
  <div class="topbar">
    <div class="event-heading">
      <h1 data-testid="event-title" th:text="${event.name()}">Event</h1>
      <div class="meta">
        <span class="meta-item">
          Max seats: <strong data-testid="event-seats" th:text="${event.maxSeats()}"></strong>
        </span>
        <span class="meta-item">
          Seats left: <strong data-testid="seats-left" th:text="${seatsLeft}"></strong>
        </span>
      </div>
    </div>
    <a class="btn btn-secondary" href="/" data-testid="back-to-list">Back to list</a>
  </div>

  <div th:if="${success}" class="alert alert-success" data-testid="success-message"
       th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-error" data-testid="error-message"
       th:text="${error}"></div>

  <div class="card register-card" data-testid="register-section">
    <h2>Register</h2>
    <form th:action="@{/events/{id}/registrations(id=${event.id()}, page=${registrations.number}, q=${q})}"
          th:object="${registrationForm}"
          method="post"
          class="form-stack"
          data-testid="register-form">

      <div th:if="${#fields.hasErrors('*')}" class="form-errors" data-testid="form-errors">
        <p th:each="err : ${#fields.errors('*')}" th:text="${err}"></p>
      </div>

      <div class="field">
        <label for="fullName">Full name</label>
        <input id="fullName" th:field="*{fullName}" data-testid="full-name-input"/>
        <p class="field-error" th:if="${#fields.hasErrors('fullName')}"
           th:errors="*{fullName}" data-testid="full-name-error"></p>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" th:field="*{email}" data-testid="email-input"/>
        <p class="field-error" th:if="${#fields.hasErrors('email')}"
           th:errors="*{email}" data-testid="email-error"></p>
      </div>

      <div class="actions">
        <button type="submit" data-testid="submit-registration">Register</button>
      </div>
    </form>
  </div>

  <div class="card registrations-card" data-testid="registrations-section">
    <h2>Registrations
      <span class="muted"
            th:text="|(${registeredCount})|"></span>
    </h2>

    <form class="filter-bar" method="get"
          th:action="@{/events/{id}(id=${event.id()})}"
          data-testid="registrations-filter">
      <input type="search"
             name="q"
             th:value="${q}"
             placeholder="Search by registrant name"
             data-testid="registrations-search-input"/>
      <button type="submit" class="btn" data-testid="registrations-search-submit">Search</button>
      <a class="btn btn-secondary"
         th:href="@{/events/{id}(id=${event.id()})}"
         th:if="${q != null and !q.isEmpty()}">Clear</a>
    </form>

    <div class="table-wrap">
      <table data-testid="registrations-table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${registrations.totalElements == 0}">
          <td colspan="3" class="empty">No registrations found.</td>
        </tr>
        <tr th:each="r : ${registrations.content}"
            th:attr="data-testid=|registration-row-${r.id()}|">
          <td th:text="${r.id()}"></td>
          <td th:text="${r.fullName()}"></td>
          <td th:text="${r.email()}"></td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" th:if="${registrations.totalPages > 1}"
         data-testid="registrations-pagination">
      <a class="btn btn-secondary"
         th:if="${registrations.hasPrevious()}"
         th:href="@{/events/{id}(id=${event.id()}, page=${registrations.number - 1}, q=${q})}">Previous</a>
      <span class="pagination-info"
            th:text="|Page ${registrations.number + 1} of ${registrations.totalPages} (${registrations.totalElements} total)|"></span>
      <a class="btn btn-secondary"
         th:if="${registrations.hasNext()}"
         th:href="@{/events/{id}(id=${event.id()}, page=${registrations.number + 1}, q=${q})}">Next</a>
    </div>
  </div>
</div>
</body>
</html>
